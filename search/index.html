    <div id="search">

        <style>
            #search {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                width: 100%;

                background-color: black;
                color: white;
                border-bottom: white 1px solid;

    <div id="tmb">

    <div class="t-note">通联日志注释</div>
    <div class="t-note">1. 日志中所有标有 "(发)" 的字段, 均为CNZW的电台信息</div>
    <div class="t-note">2. 日志中所有时间如无说明或标注, 均使用协调世界时(UTC)</div>

    <div>
        <div id="index" class="href" onclick="location.href = '/'">回到主页</div>
        <div id="list_all" class="href" onclick="location.search = '?call_sign=ALL_LOGS'">显示所有通联日志</div>
        <div id="no_call_sign" class="href" onclick="location.search = '?call_sign=NO_CALL_SIGN'">显示所有无呼号电台记录</div>
        <div id="list">
            <table>
                <tr>
                    <td>呼号</td>
                    <td>日期</td>
                    <td>通联时间</td>
                    <td>频率</td>
                    <td>操作方式</td>
                    <td>信号报告(收)</td>
                    <td>信号报告(发)</td>
                    <td>电台地理位置(收)</td>
                    <td>电台地理位置(发)</td>
                    <td>内容摘要</td>
                    <td>备注</td>
                </tr>
            </table>

            #list {

                color: #00ff00;
                border-radius: 5px;
                background-color: black;
                text-align: center;
                display: block;
                margin-left: auto;
                margin-right: auto;
            }

                word-wrap: break-word;
                border-left: #00ff00 3px solid;
                border-right: #00ff00 3px solid;
                border: #00ff00 3px solid;
                text-align: center;
            }

                font-size: 2.3vh;

                width: 33.3%;
                display: inline-block;

            #no_call_sign {
                float: right;

                display: block;
                margin-left: auto;
                margin-right: auto;
            }

            .content {
                word-break: break-all;
            }
        </style>

    <script>
        if (location.search.startsWith('?call_sign=') || location.search == '') {
            document.querySelector("input[name='call_sign']").value = location.search.replace('?call_sign=', '');
            console.log(`查询呼号或类型: ${location.search.replace('?call_sign=', '')}`);
        } else {
            alert('参数错误!');
            location.search = '?call_sign=';
        }
        if (location.search.replace('?call_sign=', '') == '') {
            location.search = '?call_sign=ALL_LOGS';
        }
        if (location.search.replace('?call_sign=', '') == 'EYE-BALL-QSO') {
            document.querySelector("title").innerText = "Eye Ball QSO - CNZW";
            function get_id(id) {
                return document.querySelector(`#${id}`);
            }
            get_id('search').style = 'display: none;';
            get_id('tmb').style = 'display: none;';
            get_id('index').style = 'display: none;';
            get_id('list_all').style = 'display: none;';
            get_id('no_call_sign').style = 'display: none;';
            document.querySelectorAll('.t-note')[0].style = 'display: none;'
            document.querySelectorAll('.t-note')[1].style = 'display: none;'
            document.querySelectorAll('.t-note')[2].style = 'display: none;'
            location.hash = '#list';
            document.querySelector("#list").innerHTML = `
            <br>
            <div class="EBQ_title">EYE BALL QSO</div>
            <br>
            <div class="EBQ">如果你是通过我的QSL卡片进入并看到此页面, 则说明我们之间可能并没有实质性通联, 所交换的卡片可能是用于收藏或纪念等用途</div>
            <br>
            <div class="EBQ">If you enter and see this page through My QSL Card, it means that there may not be any substantial communication between us, and the card exchanged may be for collection or commemorative purposes.</div>
            <br>
            <img class="search-image-PCX" src="../img/index/PCX.png" onclick="new Audio('../media/audio/index/SBPCX.mp3').play()">
            <style>
                .search-image-PCX {
                    width: 80%;
                    border-radius: 10px;
                    display: block;
                    margin-left: auto;
                    margin-right: auto;
                }
            </style>
            `;
        }
        fetch('../communication_record.json')
            .then(response => response.json())
            .then(CNZW => {
                list = CNZW;
                list_m = CNZW.length - 1;
                search_start(location.search.replace('?call_sign=', ''));
            });
        function search_start(search_call_sign) {
            while (list_m > -1 && location.search.replace('?call_sign=', '') != '' && location.search.replace('?call_sign=', '') != 'EYE-BALL-QSO') {
                if (list[list_m]['call_sign'] == '') {
                    list[list_m]['call_sign'] = 'NO_CALL_SIGN';
                }
                if (list[list_m]['call_sign'].includes(search_call_sign)) {
                    document.querySelector("#list table").innerHTML += `
                    <tr>
                        <td onclick="location.search = '?call_sign=${list[list_m]['call_sign']}'">${list[list_m]['call_sign']}</td>
                        <td>${list[list_m]['date']}</td>
                        <td>${list[list_m]['time']}</td>
                        <td>${list[list_m]['fq']}</td>
                        <td>${list[list_m]['mode']}</td>
                        <td>${list[list_m]['rst-t']}</td>
                        <td>${list[list_m]['rst-r']}</td>
                        <td>${list[list_m]['qth-t']}</td>
                        <td>${list[list_m]['qth-r']}</td>
                        <td class="content">${list[list_m]['content']}</td>
                        <td class="content">${list[list_m]['note']}</td>
                    </tr>
                    `;
                }
                if (search_call_sign == 'ALL_LOGS') {
                    document.querySelector("#list table").innerHTML += `
                    <tr>
                        <td onclick="location.search = '?call_sign=${list[list_m]['call_sign']}'">${list[list_m]['call_sign']}</td>
                        <td>${list[list_m]['date']}</td>
                        <td>${list[list_m]['time']}</td>
                        <td>${list[list_m]['fq']}</td>
                        <td>${list[list_m]['mode']}</td>
                        <td>${list[list_m]['rst-t']}</td>
                        <td>${list[list_m]['rst-r']}</td>
                        <td>${list[list_m]['qth-t']}</td>
                        <td>${list[list_m]['qth-r']}</td>
                        <td class="content">${list[list_m]['content']}</td>
                        <td class="content">${list[list_m]['note']}</td>
                    </tr>
                    `;
                }
                list_m--;
            }
        }
    </script>
